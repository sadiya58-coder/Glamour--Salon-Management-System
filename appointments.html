<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Appointments – Glamour Salon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --rose: #d4748a; --rose-dark: #b85570; --gold: #c9a96e;
      --cream: #fdf6f0; --off: #faf5f2; --charcoal: #2a2220;
      --mid: #5a4a46; --muted: #9a8480; --white: #fff;
      --blush: #f5e0e4; --blush-mid: #edc8d0;
      --shadow: 0 4px 24px rgba(42,34,32,0.09);
      --radius: 14px;
      --font-d: 'Cormorant Garamond', serif;
      --font-b: 'Jost', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: var(--font-b); background: var(--off); color: var(--charcoal); min-height: 100vh; }

    /* ── Top bar ── */
    .topbar {
      background: #1e1614; color: #fff;
      padding: 1rem 2.5rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 16px rgba(0,0,0,0.25);
    }
    .topbar-logo { font-family: var(--font-d); font-size: 1.6rem; font-weight: 600; letter-spacing: 0.05em; }
    .topbar-logo span { color: var(--rose); }
    .topbar-back {
      display: flex; align-items: center; gap: 0.5rem;
      color: rgba(255,255,255,0.7); font-size: 0.85rem;
      text-decoration: none; letter-spacing: 0.06em;
      transition: color 0.2s;
    }
    .topbar-back:hover { color: var(--rose); }

    /* ── Page header ── */
    .page-head {
      background: linear-gradient(135deg, var(--blush) 0%, var(--cream) 100%);
      padding: 2.5rem 2.5rem 2rem;
      border-bottom: 1px solid var(--blush-mid);
    }
    .page-head h1 { font-family: var(--font-d); font-size: 2.2rem; font-weight: 600; color: var(--charcoal); }
    .page-head h1 em { color: var(--rose); font-style: italic; }
    .page-head p { color: var(--mid); font-size: 0.9rem; margin-top: 0.3rem; }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex; gap: 1.2rem; flex-wrap: wrap;
      padding: 1.5rem 2.5rem;
      background: var(--white);
      border-bottom: 1px solid var(--blush-mid);
    }
    .stat-pill {
      display: flex; align-items: center; gap: 0.6rem;
      background: var(--off); border-radius: 30px;
      padding: 0.5rem 1.2rem; font-size: 0.85rem; font-weight: 500;
    }
    .stat-pill i { color: var(--rose); }
    .stat-pill strong { font-size: 1.1rem; color: var(--charcoal); }

    /* ── Controls ── */
    .controls {
      display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;
      padding: 1.2rem 2.5rem;
      background: var(--white);
      border-bottom: 1px solid var(--blush-mid);
    }
    .search-box {
      display: flex; align-items: center; gap: 0.5rem;
      border: 1.5px solid var(--blush-mid); border-radius: 30px;
      padding: 0.45rem 1rem; background: var(--off);
      flex: 1; min-width: 220px;
    }
    .search-box i { color: var(--muted); }
    .search-box input {
      border: none; background: none; outline: none;
      font-family: var(--font-b); font-size: 0.88rem; color: var(--charcoal);
      width: 100%;
    }
    .filter-select {
      border: 1.5px solid var(--blush-mid); border-radius: 30px;
      padding: 0.45rem 1rem; background: var(--off);
      font-family: var(--font-b); font-size: 0.85rem; color: var(--mid);
      outline: none; cursor: pointer;
    }
    .btn-export {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--charcoal); color: var(--white);
      padding: 0.5rem 1.2rem; border-radius: 30px;
      font-size: 0.82rem; font-weight: 500; letter-spacing: 0.06em;
      text-transform: uppercase; border: none; cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-export:hover { background: var(--rose); transform: translateY(-1px); }
    .btn-clear {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: transparent; color: #c62828;
      padding: 0.5rem 1.2rem; border-radius: 30px;
      font-size: 0.82rem; font-weight: 500; letter-spacing: 0.06em;
      text-transform: uppercase; border: 1.5px solid #fcc; cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-clear:hover { background: #fce4ec; }

    /* ── Table ── */
    .table-wrap {
      padding: 1.5rem 2.5rem 3rem;
      overflow-x: auto;
    }
    table {
      width: 100%; border-collapse: collapse;
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden;
      min-width: 900px;
    }
    thead tr { background: #1e1614; }
    thead th {
      padding: 1rem 1.1rem; text-align: left;
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.75);
    }
    tbody tr {
      border-bottom: 1px solid var(--blush);
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--cream); }
    tbody td {
      padding: 0.9rem 1.1rem; font-size: 0.88rem; color: var(--mid);
      vertical-align: middle;
    }
    .td-id { font-weight: 600; color: var(--rose); font-size: 0.8rem; letter-spacing: 0.05em; }
    .td-name { font-weight: 600; color: var(--charcoal); }
    .td-service {
      display: inline-block; padding: 0.2rem 0.7rem;
      background: var(--blush); color: var(--rose-dark);
      border-radius: 20px; font-size: 0.78rem; font-weight: 500;
      white-space: nowrap;
    }
    .badge-sent    { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.65rem; border-radius:20px; font-size:0.75rem; font-weight:500; background:#e8f5e9; color:#2e7d32; }
    .badge-failed  { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.65rem; border-radius:20px; font-size:0.75rem; font-weight:500; background:#fce4ec; color:#c62828; }
    .badge-pending { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.65rem; border-radius:20px; font-size:0.75rem; font-weight:500; background:#fff8e1; color:#f57f17; }

    .btn-del {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 0.95rem; padding: 0.3rem;
      transition: color 0.2s;
    }
    .btn-del:hover { color: #c62828; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 5rem 2rem;
    }
    .empty-state i { font-size: 3.5rem; color: var(--blush-mid); display: block; margin-bottom: 1rem; }
    .empty-state h3 { font-family: var(--font-d); font-size: 1.6rem; color: var(--muted); margin-bottom: 0.5rem; }
    .empty-state p { color: var(--muted); font-size: 0.9rem; }
    .empty-state a {
      display: inline-block; margin-top: 1.5rem;
      background: var(--rose); color: #fff;
      padding: 0.65rem 1.6rem; border-radius: 30px;
      font-size: 0.85rem; font-weight: 500; text-decoration: none;
      transition: background 0.2s;
    }
    .empty-state a:hover { background: var(--rose-dark); }

    /* ── Confirm delete modal ── */
    .del-modal {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(42,34,32,0.6); backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    .del-modal.active { display: flex; }
    .del-modal-box {
      background: var(--white); border-radius: 16px;
      padding: 2.2rem; max-width: 380px; width: 90%;
      text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .del-modal-box i { font-size: 2.5rem; color: #c62828; margin-bottom: 0.8rem; display: block; }
    .del-modal-box h3 { font-family: var(--font-d); font-size: 1.4rem; margin-bottom: 0.5rem; color: var(--charcoal); }
    .del-modal-box p { font-size: 0.88rem; color: var(--mid); margin-bottom: 1.5rem; }
    .del-btns { display: flex; gap: 0.8rem; justify-content: center; }
    .del-btns button {
      padding: 0.55rem 1.4rem; border-radius: 30px;
      font-family: var(--font-b); font-size: 0.85rem; font-weight: 500;
      cursor: pointer; border: none; transition: all 0.2s;
    }
    .del-confirm { background: #c62828; color: #fff; }
    .del-confirm:hover { background: #b71c1c; }
    .del-cancel { background: var(--off); color: var(--mid); border: 1.5px solid var(--blush-mid) !important; }

    /* ── Detail drawer ── */
    .drawer-backdrop {
      display: none; position: fixed; inset: 0; z-index: 8888;
      background: rgba(42,34,32,0.45); backdrop-filter: blur(3px);
    }
    .drawer-backdrop.active { display: block; }
    .drawer {
      position: fixed; top: 0; right: -420px; bottom: 0; z-index: 8889;
      width: 400px; background: var(--white);
      box-shadow: -8px 0 40px rgba(0,0,0,0.15);
      transition: right 0.35s cubic-bezier(.4,0,.2,1);
      overflow-y: auto; padding: 2rem;
    }
    .drawer.open { right: 0; }
    .drawer-close {
      position: absolute; top: 1.2rem; right: 1.2rem;
      background: var(--off); border: none; cursor: pointer;
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; color: var(--mid); transition: background 0.2s;
    }
    .drawer-close:hover { background: var(--blush); }
    .drawer h2 { font-family: var(--font-d); font-size: 1.6rem; font-weight: 600; color: var(--charcoal); margin-bottom: 0.3rem; }
    .drawer-id { font-size: 0.78rem; color: var(--rose); font-weight: 600; letter-spacing: 0.08em; margin-bottom: 1.5rem; display: block; }
    .drawer-row { display: flex; gap: 0.5rem; margin-bottom: 0.85rem; align-items: flex-start; }
    .drawer-row i { width: 20px; color: var(--rose); margin-top: 0.15rem; flex-shrink: 0; }
    .drawer-row div strong { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); display: block; margin-bottom: 0.1rem; }
    .drawer-row div span { font-size: 0.92rem; color: var(--charcoal); }
    .drawer-divider { border: none; border-top: 1px solid var(--blush); margin: 1.2rem 0; }

    @media (max-width: 600px) {
      .topbar { padding: 1rem 1.2rem; }
      .page-head, .stats-bar, .controls, .table-wrap { padding-left: 1rem; padding-right: 1rem; }
      .drawer { width: 100%; right: -100%; }
    }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-logo">Glamour <span>✦</span></div>
  <a href="services.html" class="topbar-back"><i class="fas fa-arrow-left"></i> Back to Services</a>
</div>

<!-- Page header -->
<div class="page-head">
  <h1>Appointment <em>Records</em></h1>
  <p>All bookings stored locally in this browser. Data persists across page refreshes.</p>
</div>

<!-- Stats bar -->
<div class="stats-bar" id="statsBar">
  <div class="stat-pill"><i class="fas fa-calendar-check"></i> Total: <strong id="statTotal">0</strong></div>
  <div class="stat-pill"><i class="fas fa-envelope"></i> Emails sent: <strong id="statSent">0</strong></div>
  <div class="stat-pill"><i class="fas fa-triangle-exclamation"></i> Email pending: <strong id="statFailed">0</strong></div>
  <div class="stat-pill"><i class="fas fa-calendar-day"></i> Today: <strong id="statToday">0</strong></div>
</div>

<!-- Controls -->
<div class="controls">
  <div class="search-box">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="Search by name, phone, service…" oninput="renderTable()" />
  </div>
  <select class="filter-select" id="filterService" onchange="renderTable()">
    <option value="">All Services</option>
    <option>Makeup Artistry</option>
    <option>Hair Styling</option>
    <option>Luxury Spa</option>
    <option>Nail Art</option>
    <option>Men's Grooming</option>
    <option>Men's Facial</option>
  </select>
  <select class="filter-select" id="filterEmail" onchange="renderTable()">
    <option value="">All Email Status</option>
    <option value="sent">Email Sent</option>
    <option value="failed">Email Failed</option>
    <option value="pending">Pending</option>
  </select>
  <button class="btn-export" onclick="exportCSV()"><i class="fas fa-download"></i> Export CSV</button>
  <button class="btn-clear" onclick="confirmClearAll()"><i class="fas fa-trash"></i> Clear All</button>
</div>

<!-- Table -->
<div class="table-wrap">
  <div id="tableContainer"></div>
</div>

<!-- Delete confirm modal -->
<div class="del-modal" id="delModal">
  <div class="del-modal-box">
    <i class="fas fa-circle-exclamation"></i>
    <h3>Delete Appointment?</h3>
    <p id="delModalMsg">This will permanently remove this record from local storage.</p>
    <div class="del-btns">
      <button class="del-cancel" onclick="closeDelModal()">Cancel</button>
      <button class="del-confirm" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- Detail drawer -->
<div class="drawer-backdrop" id="drawerBg" onclick="closeDrawer()"></div>
<div class="drawer" id="detailDrawer">
  <button class="drawer-close" onclick="closeDrawer()"><i class="fas fa-xmark"></i></button>
  <div id="drawerContent"></div>
</div>

<script>
// ══════════════════════════════════════════════
//   GLAMOUR APPOINTMENTS DASHBOARD
// ══════════════════════════════════════════════

const LS_KEY = 'glamour_appointments';
let deleteTargetId = null;

/* Load data */
function loadData() {
  return JSON.parse(localStorage.getItem(LS_KEY) || '[]');
}

/* Update stats */
function updateStats(data) {
  const todayStr = new Date().toISOString().split('T')[0];
  document.getElementById('statTotal').textContent  = data.length;
  document.getElementById('statSent').textContent   = data.filter(r => r.emailStatus === 'sent').length;
  document.getElementById('statFailed').textContent = data.filter(r => r.emailStatus !== 'sent').length;
  document.getElementById('statToday').textContent  = data.filter(r => r.date === todayStr || r.bookedAt?.includes(new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}))).length;
}

/* Email badge HTML */
function emailBadge(status) {
  if (status === 'sent')    return `<span class="badge-sent"><i class="fas fa-envelope"></i> Sent</span>`;
  if (status === 'failed')  return `<span class="badge-failed"><i class="fas fa-times"></i> Failed</span>`;
  return `<span class="badge-pending"><i class="fas fa-clock"></i> Pending</span>`;
}

/* Render table */
function renderTable() {
  const data   = loadData();
  const q      = document.getElementById('searchInput').value.toLowerCase();
  const svc    = document.getElementById('filterService').value;
  const eml    = document.getElementById('filterEmail').value;

  updateStats(data);

  let rows = [...data].reverse().filter(r => {
    const matchQ   = !q || [r.name,r.phone,r.email,r.service,r.id].some(v => v?.toLowerCase().includes(q));
    const matchSvc = !svc || r.service === svc;
    const matchEml = !eml || r.emailStatus === eml;
    return matchQ && matchSvc && matchEml;
  });

  const container = document.getElementById('tableContainer');

  if (rows.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-calendar-xmark"></i>
        <h3>${data.length === 0 ? 'No Appointments Yet' : 'No Results Found'}</h3>
        <p>${data.length === 0 ? 'When clients book appointments, they will appear here.' : 'Try adjusting your search or filters.'}</p>
        ${data.length === 0 ? '<a href="services.html#booking">Go to Booking Form</a>' : ''}
      </div>`;
    return;
  }

  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Booking ID</th>
          <th>Client</th>
          <th>Service</th>
          <th>Date</th>
          <th>Time</th>
          <th>Phone</th>
          <th>Email Notif.</th>
          <th>Booked At</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => `
          <tr style="cursor:pointer" onclick="openDrawer('${r.id}')">
            <td class="td-id">${r.id}</td>
            <td class="td-name">${escHtml(r.name)}</td>
            <td><span class="td-service">${escHtml(r.service)}</span></td>
            <td>${r.dateFormatted || r.date}</td>
            <td>${r.time}</td>
            <td>${escHtml(r.phone)}</td>
            <td>${emailBadge(r.emailStatus)}</td>
            <td style="font-size:0.78rem;color:var(--muted)">${r.bookedAt || '—'}</td>
            <td onclick="event.stopPropagation()">
              <button class="btn-del" onclick="askDelete('${r.id}',event)" title="Delete">
                <i class="fas fa-trash-can"></i>
              </button>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

/* HTML escape */
function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* Detail drawer */
function openDrawer(id) {
  const data = loadData();
  const r = data.find(x => x.id === id);
  if (!r) return;
  document.getElementById('drawerContent').innerHTML = `
    <h2>${escHtml(r.name)}</h2>
    <span class="drawer-id">${r.id}</span>
    <hr class="drawer-divider"/>
    <div class="drawer-row"><i class="fas fa-scissors"></i><div><strong>Service</strong><span>${escHtml(r.service)}${r.subService && r.subService !== 'Not specified' ? ' – ' + escHtml(r.subService) : ''}</span></div></div>
    <div class="drawer-row"><i class="fas fa-calendar"></i><div><strong>Date</strong><span>${r.dateFormatted || r.date}</span></div></div>
    <div class="drawer-row"><i class="fas fa-clock"></i><div><strong>Time</strong><span>${r.time}</span></div></div>
    <hr class="drawer-divider"/>
    <div class="drawer-row"><i class="fas fa-phone"></i><div><strong>Phone</strong><span>${escHtml(r.phone)}</span></div></div>
    <div class="drawer-row"><i class="fas fa-envelope"></i><div><strong>Email</strong><span>${escHtml(r.email)}</span></div></div>
    <div class="drawer-row"><i class="fas fa-venus-mars"></i><div><strong>Gender</strong><span>${escHtml(r.gender || '—')}</span></div></div>
    <hr class="drawer-divider"/>
    <div class="drawer-row"><i class="fas fa-note-sticky"></i><div><strong>Notes</strong><span>${escHtml(r.notes && r.notes !== 'None' ? r.notes : '—')}</span></div></div>
    <div class="drawer-row"><i class="fas fa-envelope-circle-check"></i><div><strong>Email Notification</strong><span>${r.emailStatus === 'sent' ? '✅ Sent to salon' : r.emailStatus === 'failed' ? '❌ Failed to send' : '⏳ Pending'}</span></div></div>
    <div class="drawer-row"><i class="fas fa-calendar-plus"></i><div><strong>Booked At</strong><span>${r.bookedAt || '—'}</span></div></div>
    <hr class="drawer-divider"/>
    <button class="btn-export" style="width:100%;justify-content:center;display:flex;gap:.4rem" onclick="askDelete('${r.id}',event);closeDrawer()">
      <i class="fas fa-trash-can"></i> Delete This Record
    </button>
  `;
  document.getElementById('detailDrawer').classList.add('open');
  document.getElementById('drawerBg').classList.add('active');
}
function closeDrawer() {
  document.getElementById('detailDrawer').classList.remove('open');
  document.getElementById('drawerBg').classList.remove('active');
}

/* Delete */
function askDelete(id, e) {
  if (e) e.stopPropagation();
  deleteTargetId = id;
  const data = loadData();
  const r = data.find(x => x.id === id);
  document.getElementById('delModalMsg').textContent =
    r ? `Delete booking "${r.id}" for ${r.name}? This cannot be undone.` : 'This cannot be undone.';
  document.getElementById('delModal').classList.add('active');
}
function closeDelModal() {
  document.getElementById('delModal').classList.remove('active');
  deleteTargetId = null;
}
function confirmDelete() {
  if (!deleteTargetId) return;
  const data = loadData().filter(r => r.id !== deleteTargetId);
  localStorage.setItem(LS_KEY, JSON.stringify(data));
  closeDelModal();
  renderTable();
}

/* Clear all */
function confirmClearAll() {
  const data = loadData();
  if (data.length === 0) { alert('No appointments to clear.'); return; }
  deleteTargetId = '__ALL__';
  document.getElementById('delModalMsg').textContent = `Delete ALL ${data.length} appointment(s)? This cannot be undone.`;
  document.getElementById('delModal').classList.add('active');
  // override confirmDelete for this case
  document.querySelector('.del-confirm').onclick = function() {
    localStorage.removeItem(LS_KEY);
    closeDelModal();
    renderTable();
    document.querySelector('.del-confirm').onclick = confirmDelete;
  };
}

/* Export CSV */
function exportCSV() {
  const data = loadData();
  if (data.length === 0) { alert('No appointments to export.'); return; }
  const headers = ['Booking ID','Name','Phone','Email','Gender','Service','Sub-Service','Date','Time','Notes','Email Status','Booked At'];
  const rows = data.map(r => [
    r.id, r.name, r.phone, r.email, r.gender || '',
    r.service, r.subService || '', r.dateFormatted || r.date, r.time,
    r.notes || '', r.emailStatus || 'pending', r.bookedAt || ''
  ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `glamour-appointments-${Date.now()}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

/* Close del modal on backdrop */
document.getElementById('delModal').addEventListener('click', e => {
  if (e.target === document.getElementById('delModal')) closeDelModal();
});

/* Init */
renderTable();

/* Auto-refresh every 3 seconds in case a new booking comes in from another tab */
